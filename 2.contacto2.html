<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - Jorge Cafrune</title>
</head>
<body>
  <header>
    <nav>
      <a href="inicio.html">Inicio</a> |
      <a href="logros.html">Logros</a> |
      <a href="contacto.html">Contacto</a>
    </nav>
    <h1>Contacto y suscripción</h1>
  </header>

  <main>
    <section>
      <h2>Escríbenos</h2>
      <form>
        <label for="nombre">Nombre:</label><br>
        <input type="text" id="nombre" name="nombre"><br><br>

        <label for="email">Correo electrónico:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="mensaje">Mensaje:</label><br>
        <textarea id="mensaje" name="mensaje" rows="4" cols="40"></textarea><br><br>

        <button type="submit">Enviar</button>
      </form>
    </section>

    <section>
      <h2>Boletín</h2>
      <form>
        <label for="suscripcion">Correo electrónico:</label><br>
        <input type="email" id="suscripcion" name="suscripcion"><br><br>

        <button type="submit">Suscribirse</button>
      </form>
    </section>

    <section>
      <h2>Redes y horarios</h2>
      <table border="1" cellpadding="8">
        <thead>
          <tr>
            <th>Canal</th>
            <th>Detalle</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Horario</td>
            <td>Lunes a viernes, 9:00 a 18:00</td>
          </tr>
          <tr>
            <td>Facebook</td>
            <td>facebook.com/jorge.cafrune</td>
          </tr>
          <tr>
            <td>Instagram</td>
            <td>@jorge.cafrune.oficial</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
